<svg width="1600" height="880" viewBox="0 0 1600 880" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="880" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FAFF"/>
      <stop offset="0.45" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F7F3FF"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F766E"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <style>
      .title{font:700 44px -apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;fill:#0F172A;letter-spacing:.2px}
      .subtitle{font:500 22px -apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;fill:#475569}
      .section{font:700 22px -apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;fill:#1E293B}
      .label{font:600 17px -apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;fill:#0F172A}
      .small{font:500 13px -apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;fill:#475569}
      .tiny{font:500 12px -apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;fill:#64748B}
      .mono{font:600 13px 'SFMono-Regular',Consolas,monospace;fill:#334155}
      .card{fill:#FFFFFF;stroke:#CBD5E1;stroke-width:1.5;rx:18;filter:url(#shadow)}
      .soft{fill:#F8FAFC;stroke:#CBD5E1;stroke-width:1.3;rx:14}
      .blueStroke{stroke:#2563EB;stroke-width:2.5;fill:none}
      .greenStroke{stroke:#0F766E;stroke-width:2.5;fill:none}
      .dash{stroke:#94A3B8;stroke-width:2;stroke-dasharray:8 8;fill:none}
    </style>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563EB"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0F766E"/>
    </marker>
  </defs>

  <rect width="1600" height="880" fill="url(#bg)"/>
  <text x="800" y="64" text-anchor="middle" class="title">obsidian_llm_wiki_plus Architecture</text>
  <text x="800" y="100" text-anchor="middle" class="subtitle">Obsidian + LLM Wiki + Agent Skills = a traceable, reusable, evolving knowledge OS</text>

  <!-- Agent layer -->
  <rect x="60" y="135" width="1480" height="170" class="card"/>
  <text x="95" y="178" class="section">1. Agent &amp; Tool Layer</text>
  <rect x="330" y="155" width="210" height="58" class="soft"/><text x="435" y="190" text-anchor="middle" class="label">Claude Code</text>
  <rect x="575" y="155" width="210" height="58" class="soft"/><text x="680" y="190" text-anchor="middle" class="label">Codex</text>
  <rect x="820" y="155" width="210" height="58" class="soft"/><text x="925" y="190" text-anchor="middle" class="label">Gemini</text>
  <rect x="1065" y="155" width="210" height="58" class="soft"/><text x="1170" y="190" text-anchor="middle" class="label">Other Agents</text>
  <path d="M435 213 V240 H800 V252" class="blueStroke" marker-end="url(#arrowBlue)"/>
  <path d="M680 213 V240 H800 V252" class="blueStroke" marker-end="url(#arrowBlue)"/>
  <path d="M925 213 V240 H800 V252" class="blueStroke" marker-end="url(#arrowBlue)"/>
  <path d="M1170 213 V240 H800 V252" class="blueStroke" marker-end="url(#arrowBlue)"/>
  <rect x="330" y="247" width="945" height="42" rx="16" fill="#EFF6FF" stroke="#93C5FD"/>
  <text x="800" y="274" text-anchor="middle" class="label">.agents/skills/</text>
  <text x="405" y="274" class="mono">capture</text><text x="520" y="274" class="mono">research</text><text x="640" y="274" class="mono">integrate</text><text x="765" y="274" class="mono">kickoff</text><text x="875" y="274" class="mono">daily-work</text><text x="1010" y="274" class="mono">decision-record</text><text x="1190" y="274" class="mono">content-create</text>

  <!-- Knowledge workflow -->
  <rect x="60" y="335" width="1480" height="250" class="card"/>
  <text x="95" y="378" class="section">2. Knowledge Workflow</text>
  <rect x="220" y="400" width="150" height="78" class="soft"/><text x="295" y="430" text-anchor="middle" class="label">External</text><text x="295" y="454" text-anchor="middle" class="label">Sources</text>
  <rect x="420" y="400" width="165" height="78" class="soft"/><text x="502" y="430" text-anchor="middle" class="label">Raw Sources</text><text x="502" y="456" text-anchor="middle" class="mono">60_Raw_Sources</text>
  <rect x="635" y="400" width="150" height="78" class="soft"/><text x="710" y="430" text-anchor="middle" class="label">Research</text><text x="710" y="456" text-anchor="middle" class="mono">30_Research</text>
  <rect x="835" y="400" width="180" height="78" class="soft"/><text x="925" y="430" text-anchor="middle" class="label">Knowledge Base</text><text x="925" y="456" text-anchor="middle" class="mono">40_Knowledge_Base</text>
  <rect x="1065" y="400" width="180" height="78" class="soft"/><text x="1155" y="430" text-anchor="middle" class="label">Decision Center</text><text x="1155" y="456" text-anchor="middle" class="mono">80_Decision_Center</text>
  <rect x="1295" y="400" width="165" height="78" class="soft"/><text x="1377" y="430" text-anchor="middle" class="label">Content Creation</text><text x="1377" y="456" text-anchor="middle" class="mono">70_Content_Creation</text>
  <path d="M370 439 H414" class="greenStroke" marker-end="url(#arrowGreen)"/><path d="M585 439 H629" class="greenStroke" marker-end="url(#arrowGreen)"/><path d="M785 439 H829" class="greenStroke" marker-end="url(#arrowGreen)"/><path d="M1015 439 H1059" class="greenStroke" marker-end="url(#arrowGreen)"/><path d="M1245 439 H1289" class="greenStroke" marker-end="url(#arrowGreen)"/>
  <rect x="420" y="510" width="165" height="50" class="soft"/><text x="502" y="541" text-anchor="middle" class="label">Projects</text><text x="502" y="558" text-anchor="middle" class="mono">20_Projects</text>
  <rect x="835" y="510" width="180" height="50" class="soft"/><text x="925" y="541" text-anchor="middle" class="label">Daily Work</text><text x="925" y="558" text-anchor="middle" class="mono">10_Daily</text>
  <path d="M502 510 V482" class="dash"/><path d="M925 510 V482" class="dash"/><path d="M1015 535 H1155 V482" class="dash"/>

  <!-- System layer -->
  <rect x="60" y="615" width="1480" height="115" class="card"/>
  <text x="95" y="658" class="section">3. System Layer</text>
  <rect x="280" y="650" width="170" height="48" class="soft"/><text x="365" y="681" text-anchor="middle" class="label">Templates</text>
  <rect x="500" y="650" width="170" height="48" class="soft"/><text x="585" y="681" text-anchor="middle" class="label">Rules</text>
  <rect x="720" y="650" width="170" height="48" class="soft"/><text x="805" y="681" text-anchor="middle" class="label">Lifecycle</text>
  <rect x="940" y="650" width="170" height="48" class="soft"/><text x="1025" y="681" text-anchor="middle" class="label">Logs</text>
  <rect x="1160" y="650" width="260" height="48" class="soft"/><text x="1290" y="681" text-anchor="middle" class="label">Init / Merge / Migrate / Validate</text>

  <!-- Migration flow -->
  <rect x="60" y="760" width="1480" height="80" class="card"/>
  <text x="95" y="810" class="section">4. Migration Flow</text>
  <rect x="340" y="780" width="210" height="38" class="soft"/><text x="445" y="805" text-anchor="middle" class="label">Existing Vault</text>
  <rect x="650" y="780" width="210" height="38" class="soft"/><text x="755" y="805" text-anchor="middle" class="label">Staging Inbox</text>
  <rect x="960" y="780" width="210" height="38" class="soft"/><text x="1065" y="805" text-anchor="middle" class="label">Review Queue</text>
  <rect x="1270" y="780" width="210" height="38" class="soft"/><text x="1375" y="805" text-anchor="middle" class="label">CN / EN Templates</text>
  <path d="M550 799 H644" class="blueStroke" marker-end="url(#arrowBlue)"/><path d="M860 799 H954" class="blueStroke" marker-end="url(#arrowBlue)"/>
</svg>
